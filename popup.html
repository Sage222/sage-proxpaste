<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .row {
      margin-bottom: 14px;
    }
    label {
      font-size: 12px;
      color: #a6adc8;
      display: block;
      margin-bottom: 6px;
    }
    input[type=range] {
      width: 100%;
      accent-color: #89b4fa;
    }
    .speed-display {
      font-size: 12px;
      color: #89b4fa;
      text-align: right;
      margin-top: 2px;
    }
    button {
      width: 100%;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover { background: #74c7ec; }
    .hint {
      font-size: 11px;
      color: #6c7086;
      text-align: center;
    }
    kbd {
      background: #313244;
      color: #cdd6f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h2>📋 Proxmox Paste</h2>

  <div class="row">
    <label>Typing speed (delay between characters)</label>
    <input type="range" id="speed" min="10" max="200" value="50">
    <div class="speed-display"><span id="speedVal">50</span> ms per character</div>
  </div>

  <button id="openPanel">Open Paste Panel</button>

  <div class="hint">Or use <kbd>Ctrl+M</kbd> on the console page</div>

  <script src="popup.js"></script>
</body>
</html>
